<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>HOI4 Focus Tree Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <nav id="left-panel" class="left-panel">
            <div class="menu-container">
                <h1>HOI4 편집기</h1>

                <h3 class="menu-section-title">프로젝트</h3>
                <button id="btn-save">📦 프로젝트 다운로드 (ZIP)</button>
                <button id="btn-load" class="secondary">📂 프로젝트 불러오기</button>
                <div class="undo-redo-group">
                    <button id="btn-undo" title="실행 취소 (Ctrl+Z)" disabled>↩ 취소</button>
                    <button id="btn-redo" title="다시 실행 (Ctrl+Y)" disabled>↪ 재실행</button>
                </div>

                <hr>
                <h3 class="menu-section-title">중점 파일</h3>
                <button id="btn-import-focus">📥 중점 파일 불러오기 (.txt)</button>
                <button id="btn-export-focus" class="secondary">📄 중점 파일만 내보내기</button>

                <hr>
                <h3 class="menu-section-title">편집</h3>
                <button id="btn-tree-settings">⚙ 중점계통도 설정</button>
                <button id="btn-new-focus">＋ 새 중점 추가</button>

                <hr>
                <button id="btn-manage-elements">🔗 연계 요소 관리</button>

                <hr>
                <div class="stats-info">
                    <small>총 중점: <span id="focus-count">0</span></small>
                </div>
            </div>
        </nav>

        <aside id="editor-drawer-panel" class="editor-drawer-panel">
            <div class="panel-header">
                <h3 id="panel-title">편집</h3>
                <button id="btn-close-panel" title="닫기">&times;</button>
            </div>
            <div id="panel-content" class="panel-content"></div>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <button id="btn-mobile-menu" class="mobile-only-btn">☰</button>
                <h2 id="main-header-title">중점 트리 편집기</h2>
            </header>

            <div id="focus-editor-view">
                <div id="center-panel" class="center-panel">
                    <div id="visual-editor"></div>
                </div>
            </div>

            <div id="linked-elements-view" class="hidden">
                <div class="page-header">
                    <h2>연계 요소 관리</h2>
                    <button id="btn-back-to-focus" class="secondary" style="width:auto;padding:6px 16px;">&larr; 돌아가기</button>
                </div>
                <div class="elements-container">
                    <div class="elements-section">
                        <h3>로컬라이제이션 (Localisation)</h3>
                        <div class="form-group">
                            <label for="localisation-language">언어 선택</label>
                            <select id="localisation-language">
                                <option value="english" selected>영어 (English)</option>
                                <option value="korean">한국어 (Korean)</option>
                                <option value="japanese">일본어 (Japanese)</option>
                                <option value="german">독일어 (German)</option>
                                <option value="french">프랑스어 (French)</option>
                                <option value="spanish">스페인어 (Spanish)</option>
                                <option value="russian">러시아어 (Russian)</option>
                                <option value="polish">폴란드어 (Polish)</option>
                                <option value="braz_por">브라질 포르투갈어</option>
                                <option value="simp_chinese">중국어 간체</option>
                            </select>
                        </div>
                        <div id="localisation-list" class="localisation-list"></div>
                        <div class="form-actions">
                            <button id="btn-download-localisation">로컬라이제이션 다운로드 (.yml)</button>
                            <button id="btn-refresh-localisation" class="secondary">새로고침</button>
                        </div>
                    </div>
                    <hr style="margin:30px 0;">
                    <div class="elements-section">
                        <h3>디시전 (Decisions)</h3>
                        <p class="coming-soon">향후 추가 예정</p>
                        <button disabled>새 디시전 추가</button>
                    </div>
                    <hr style="margin:30px 0;">
                    <div class="elements-section">
                        <h3>국민정신 (National Spirits / Ideas)</h3>
                        <p class="coming-soon">향후 추가 예정</p>
                        <button disabled>새 국민정신 추가</button>
                    </div>
                    <hr style="margin:30px 0;">
                    <div class="elements-section">
                        <h3>이벤트 (Events)</h3>
                        <p class="coming-soon">향후 추가 예정</p>
                        <button disabled>새 이벤트 추가</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="overlay" class="overlay hidden"></div>

    <!-- 숨겨진 파일 입력 -->
    <input type="file" id="file-loader-project" accept=".json" style="display:none;">
    <input type="file" id="file-loader-focus"   accept=".txt"  style="display:none;">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
